name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  tests:
    name: "${{ matrix.group.name }} / py${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]
        group:
          - name: Group A Core Algorithms
            pattern: "tests/test_rs*.py tests/test_cg*.py tests/test_mixed*.py tests/test_fitting_jit*.py tests/test_smooth_outer_loop.py tests/test_distribution_registry_complete.py"
          - name: Group B R Consistency
            pattern: "tests/test_*r_consistency*.py tests/test_consistency_families.py tests/test_dpqr_r_consistency.py"
          - name: Group C Smooth Diagnostics Prediction
            pattern: "tests/test_smooth*.py tests/test_diagnostics*.py tests/test_prediction*.py tests/test_serialization*.py tests/test_grpc_server.py"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install uv
      - name: Install dependencies
        run: |
          cd omnilss
          uv pip install --system -e ".[dev]"
      - name: Run grouped tests in parallel
        env:
          MPLBACKEND: Agg
          JAX_PLATFORMS: cpu
          JAX_ENABLE_X64: "true"
        run: |
          cd omnilss
          python -m pytest -n auto ${{ matrix.group.pattern }} -v --cov=omnilss --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./omnilss/coverage.xml
          flags: ${{ matrix.group.name }}
          fail_ci_if_error: false

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install uv
      - run: |
          cd omnilss
          uv pip install --system -e ".[dev]"
          uv pip install --system ruff black mypy
      - run: |
          cd omnilss
          black --check src/omnilss/
      - run: |
          cd omnilss
          ruff check src/omnilss/ --select E,W,F --ignore E501
      - run: |
          cd omnilss
          mypy src/omnilss/ --ignore-missing-imports
        continue-on-error: true

  benchmark-smoke:
    name: Benchmark Smoke (no R/GPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install uv
      - name: Install dependencies
        run: |
          cd omnilss
          uv pip install --system -e ".[dev]"
      - name: Run Python-only benchmark smoke
        env:
          MPLBACKEND: Agg
          JAX_PLATFORMS: cpu
          JAX_ENABLE_X64: "true"
          PYTHONPATH: omnilss/src
        run: |
          python benchmarks/jax_rs_benchmark.py --suite no-r --smoke --families NO --n-values 100 --n-reps 2 --out-dir benchmarks/results/smoke
