syntax = "proto3";
package omnilss;

message FitRequest {
  string formula = 1;
  string family = 2;
  string data_json = 3;
  string sigma_formula = 4;
  string nu_formula = 5;
  string tau_formula = 6;
  string method = 7;
  int32 max_iter = 8;
  bool verbose = 9;
}

message FitResponse {
  string model_id = 1;
  bool success = 2;
  string error = 3;
  double deviance = 4;
  int32 iterations = 5;
  bool converged = 6;
}


message ListModelsRequest {}
message ListModelsResponse {
  repeated string model_ids = 1;
  bool success = 2;
  string error = 3;
}

message DeleteModelRequest { string model_id = 1; }
message DeleteModelResponse {
  bool deleted = 1;
  bool success = 2;
  string error = 3;
}

service FitService {
  rpc Fit(FitRequest) returns (FitResponse);
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc DeleteModel(DeleteModelRequest) returns (DeleteModelResponse);
}
